<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Tanay Mishra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-code/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-code/600.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-code/700.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="blog.css">

  <meta name="description" content="Blog by Tanay Mishra — Thoughts on coding, tech, and building things.">
</head>

<body class="blog-page">
  <!-- Parallax Background -->
  <div class="parallax-bg">
    <div class="parallax-orb orb-1"></div>
    <div class="parallax-orb orb-2"></div>
    <div class="parallax-orb orb-3"></div>
    <div class="parallax-grid"></div>
  </div>

  <!-- Navbar -->
  <nav class="blog-nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">Tanay Mishra</a>
      <div class="nav-links">
        <a href="././">Home</a>
        <a href="././#about">About</a>
        <a href="././#work">Work</a>
        <a href="./" class="active">Blog</a>
        <a href="./editor.html" title="Write"><i class="fas fa-pen"></i></a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <!-- Header -->
      <div class="blog-header">
        <h1>The <span>Blog</span></h1>
        <p>Thoughts, tutorials, and dev logs</p>
        <div class="blog-search">
          <i class="fas fa-search"></i>
          <input type="text" id="blog-search-input" placeholder="Search posts…">
        </div>
      </div>

      <!-- Post Grid -->
      <div class="blog-grid" id="blog-grid">
        <!-- Rendered by JS -->
      </div>

      <!-- Single Post View -->
      <div class="blog-post-view" id="blog-post-view" style="display:none">
        <a href="#" class="back-link" id="back-to-list">
          <i class="fas fa-arrow-left"></i> Back to posts
        </a>
        <h1 id="post-title"></h1>
        <div class="post-meta">
          <span id="post-date"></span>
          <span>·</span>
          <span id="post-reading-time"></span>
        </div>
        <div id="post-tags"></div>
        <div class="post-content" id="post-content"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" style="margin-top: auto">
    <div class="container">
      <div class="footer-content">
        <div class="footer-text">
          <p>&copy; 2026 Tanay Mishra. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="blog.js"></script>
</body>

</html>
